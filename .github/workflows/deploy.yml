name: Deploy GitHub Pages

on:
  push:
    branches:
      - main

# Prevent simultaneous Pages deployments when a scheduled daily run and a
# push-triggered deploy overlap.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # Pull repository code.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Install Node runtime.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # Install npm packages.
      - name: Install dependencies
        run: npm install

      # Run JS and CSS lint checks.
      - name: Run linters
        run: npm run lint

      # Validate published links.
      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          fail: true
          args: >-
            --no-progress
            --verbose
            --accept 200,206,302,403,429,520
            --root-dir ${{ github.workspace }}
            --exclude 'localhost'
            ./*.html ./sitemap.xml ./*.md docs/*.md

  deploy:
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      pages: write
      id-token: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # Pull repository code.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Install Node runtime.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # Install npm packages.
      - name: Install dependencies
        run: npm install

      # Refresh Instagram feed JSON (latest 12 posts across configured accounts).
      - name: Sync Instagram feed
        env:
          INSTAGRAM_GRAPH_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_GRAPH_ACCESS_TOKEN }}
          INSTAGRAM_GRAPH_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_GRAPH_BUSINESS_ACCOUNT_ID }}
          INSTAGRAM_ACCOUNT_HANDLES: cksdachurch,ck.sda,cksdamusic,cksda_ya,cksda_youth,pioneerspathfinder
        run: node scripts/fetch-instagram.js

      # Build minified site assets.
      - name: Build assets with API key
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          CALENDAR_API_KEY: ${{ secrets.CALENDAR_API_KEY }}
        run: npm run build

      # Update newsletter verse for today.
      - name: Inject today's OHC devotional verse
        run: node scripts/fetch-devotional.js

      # Keep only publishable web files.
      - name: Remove non-web files before publish
        run: |
          rm -rf docs/ scripts/ tests/ test-results/ playwright-report/ node_modules/
          rm -f package.json package-lock.json eslint.config.js playwright.config.js README.md

      # Prepare Pages deployment context.
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      # Upload static site artifact.
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      # Publish to GitHub Pages.
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
