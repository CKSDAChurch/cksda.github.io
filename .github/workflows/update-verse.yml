name: Update Daily Verse

on:
  schedule:
    # 05:00 UTC daily = midnight EST (UTC-5) / 1am EDT (UTC-4)
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  update-verse:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch and parse White Estate verse of the day
        run: |
          python3 - <<'PY'
          import json, re, sys, urllib.request
          from datetime import datetime, timezone, timedelta

          # Current date in America/New_York (UTC-4 EDT / UTC-5 EST); use UTC-5 to match cron trigger
          now_ct = datetime.now(timezone(timedelta(hours=-5)))
          month = now_ct.strftime('%m')
          day   = now_ct.strftime('%d')
          date_key = f"{month}_{day}"

          url = f"https://whiteestate.org/devotional/ohc/{date_key}/"
          print(f"Fetching {url}")

          BIBLE_BOOKS = (
              r'Genesis|Exodus|Leviticus|Numbers|Deuteronomy|Joshua|Judges|Ruth|'
              r'1\s*Samuel|2\s*Samuel|1\s*Kings|2\s*Kings|1\s*Chronicles|2\s*Chronicles|'
              r'Ezra|Nehemiah|Esther|Job|Psalms?|Proverbs|Ecclesiastes|Song\s+of\s+Solomon|'
              r'Isaiah|Jeremiah|Lamentations|Ezekiel|Daniel|Hosea|Joel|Amos|Obadiah|Jonah|'
              r'Micah|Nahum|Habakkuk|Zephaniah|Haggai|Zechariah|Malachi|'
              r'Matthew|Mark|Luke|John|Acts|Romans|1\s*Corinthians|2\s*Corinthians|'
              r'Galatians|Ephesians|Philippians|Colossians|1\s*Thessalonians|2\s*Thessalonians|'
              r'1\s*Timothy|2\s*Timothy|Titus|Philemon|Hebrews|James|'
              r'1\s*Peter|2\s*Peter|1\s*John|2\s*John|3\s*John|Jude|Revelation'
          )
          REF_PATTERN = re.compile(
              rf'(?:{BIBLE_BOOKS})\s+\d{{1,3}}:\d{{1,3}}(?:[-\u2013]\d{{1,3}})?',
              re.IGNORECASE
          )

          try:
              req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
              with urllib.request.urlopen(req, timeout=10) as resp:
                  html = resp.read().decode('utf-8', errors='replace')
          except Exception as e:
              print(f"Failed to fetch White Estate page: {e}", file=sys.stderr)
              sys.exit(1)

          # Extract p.devotionaltext content (strip HTML tags)
          block_match = re.search(r'<p[^>]*class="[^"]*devotionaltext[^"]*"[^>]*>(.*?)</p>', html, re.DOTALL | re.IGNORECASE)
          if not block_match:
              print("Could not find devotionaltext block", file=sys.stderr)
              sys.exit(1)

          raw = re.sub(r'<[^>]+>', '', block_match.group(1))
          clean = re.sub(r'\s+', ' ', raw).strip()

          matches = list(REF_PATTERN.finditer(clean))
          if not matches:
              print(f"Could not find Bible reference in: {clean[:200]}", file=sys.stderr)
              sys.exit(1)

          last = matches[-1]
          reference = re.sub(r'\s+', ' ', last.group(0)).strip()
          verse_text = clean[:last.start()].strip().rstrip(' .')

          if not verse_text or not reference:
              print("Parsed empty verse or reference", file=sys.stderr)
              sys.exit(1)

          out = {
              "date": date_key,
              "reference": reference,
              "text": f'"{verse_text}."',
              "devotionalUrl": url
          }

          output_path = "assets/programs/verse-today.json"
          with open(output_path, 'w', encoding='utf-8') as f:
              json.dump(out, f, ensure_ascii=False, indent=2)

          print(f"Written: {reference} — {verse_text[:60]}...")
          PY

      - name: Commit updated verse
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/programs/verse-today.json
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "chore: update daily verse [skip ci]"
          git push
