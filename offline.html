<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>You're offline | Collegedale Korean SDA Church</title>
	<style>
		* { box-sizing: border-box; margin: 0; padding: 0; }
		body {
			font-family: "Source Sans Pro", "Segoe UI", Arial, sans-serif;
			background: #f7f3ed;
			color: #4a4540;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			min-height: 100vh;
			padding: 2rem;
			text-align: center;
		}
		img { width: 80px; height: 80px; margin-bottom: 1.5rem; }
		h1 { font-size: 1.75rem; color: #2c3830; margin-bottom: 0.75rem; }
		p { max-width: 28rem; line-height: 1.6; margin-bottom: 1.5rem; }
		button {
			padding: 0.65rem 1.75rem;
			background: #2c3830;
			color: #f7f3ed;
			border: none;
			border-radius: 4px;
			font-size: 1rem;
			cursor: pointer;
		}
		button:hover, button:focus { background: #3a4a40; outline: 2px solid #2c3830; outline-offset: 2px; }
	</style>
</head>
<body>
	<img src="/images/logo-light.png" alt="Collegedale Korean SDA Church" width="80" height="80" />
	<h1>You're offline</h1>
	<p>It looks like you don't have an internet connection right now.<br>
	Please check your network and try again.</p>
	<button onclick="window.location.reload()">Try again</button>
</body>
</html>
